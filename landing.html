<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Romanna — Login</title>
  <link rel="stylesheet" href="landing.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inria+Sans:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="frame-wrapper" id="frameWrapper">
    <div class="mobile-frame" id="mobileFrame">

      <div class="dot dot-1"></div>
      <div class="dot dot-2"></div>
      <div class="dot dot-3"></div>
      <div class="dot dot-4"></div>
      <div class="dot dot-5"></div>

      <img class="logo-main" src="src/logo principal.png" alt="La Romanna">

      <div class="btn-fidelidade" id="btnFidelidade">
        <img class="btn-fidelidade-icon" id="fidIcon" src="src/logo fidelidade.png" alt="La Romanna Selo">
        <span class="btn-fidelidade-text" id="fidTexto">
          Deslize para fazer seu pedido<br>e ganhe pontos!
        </span>
      </div>

      <p class="divider-text">Ou conheça nossa loja no ifood.</p>

      <a
        class="btn-ifood"
        id="btnIfood"
        href="https://www.ifood.com.br/delivery/recife-pe/la-romana-rosarinho/8f18491d-2575-4f09-a774-99a297b6911a?utm_medium=share"
        target="_blank"
        rel="noopener noreferrer"
      >
        <img class="btn-ifood-logo" src="src/logo ifood.png" alt="iFood">
      </a>

    </div>
  </div>

  <script src="landing.js"></script>

</body>
</html>
