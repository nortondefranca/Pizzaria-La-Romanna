<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>La Romanna — Meus Pedidos</title>
  <link rel="stylesheet" href="historico.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Montserrat:wght@700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="mobile-frame">

    <!-- Logo -->
    <header class="header">
      <img class="header-logo" src="src/logo principal.png" alt="La Romanna">
    </header>

    <!-- Título -->
    <h1 class="page-title">Meus pedidos</h1>

    <!-- Lista de pedidos -->
    <div class="orders-list">

      <!-- Pedido 1 - Em preparo -->
      <div class="order-card">
        <div class="order-top">
          <span class="order-id">#LR-0482</span>
          <span class="order-status status-preparo">Em preparo</span>
        </div>
        <span class="order-date">Hoje, 20h15</span>
        <p class="order-items">Casquinha La Romana<br>Lasanha</p>
        <div class="order-bottom">
          <span class="order-total-label">Total:</span>
          <span class="order-total-value">R$ 119,00</span>
        </div>
      </div>

      <!-- Pedido 2 - Entregue -->
      <div class="order-card">
        <div class="order-top">
          <span class="order-id">#LR-0482</span>
          <span class="order-status status-entregue">Entregue</span>
        </div>
        <span class="order-date">Hoje, 20h15</span>
        <p class="order-items">Casquinha La Romana<br>Lasanha</p>
        <div class="order-bottom">
          <span class="order-total-label">Total:</span>
          <span class="order-total-value">R$ 119,00</span>
        </div>
      </div>

      <!-- Pedido 3 - Em preparo -->
      <div class="order-card">
        <div class="order-top">
          <span class="order-id">#LR-0482</span>
          <span class="order-status status-preparo">Em preparo</span>
        </div>
        <span class="order-date">Hoje, 20h15</span>
        <p class="order-items">Casquinha La Romana<br>Lasanha</p>
        <div class="order-bottom">
          <span class="order-total-label">Total:</span>
          <span class="order-total-value">R$ 119,00</span>
        </div>
      </div>

    </div>

  </div>

</body>
</html>
