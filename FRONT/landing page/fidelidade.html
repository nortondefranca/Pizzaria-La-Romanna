<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>La Romanna — Fidelidade</title>
  <link rel="stylesheet" href="fidelidade.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Montserrat:wght@700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="mobile-frame">

    <!-- Header vermelho -->
    <div class="fidelidade-header">
      <div class="header-greeting">
        <span class="greeting-text">Olá, <strong>Layza!</strong></span>
      </div>
      <p class="header-points-label">Você possui 10 pontos</p>
      <div class="header-circle"></div>
    </div>

    <!-- Conteúdo principal -->
    <div class="fidelidade-content">

      <!-- Card de pontos -->
      <div class="points-card">
        <span class="points-label">SEUS PONTOS</span>
        <span class="points-number">10</span>

        <!-- Barra de progresso -->
        <div class="progress-bar">
          <div class="progress-fill" style="width: 66%;"></div>
        </div>

        <p class="points-goal">Faltam 320 pontos para pizza grátis</p>
      </div>

      <!-- Botão ver cardápio -->
      <a href="cardapio.html" class="btn-cardapio">Ver cardápio</a>

      <!-- Seção Massas Italianas -->
      <section class="section">
        <div class="section-header">
          <h2 class="section-title">Massas Italianas</h2>
          <a href="#" class="section-link">Ver mais</a>
        </div>
        <div class="section-banner">
          <img class="section-banner-img" src="src/macarrao.png" alt="Massas Italianas">
        </div>
      </section>

    </div>

    <!-- Navegação inferior -->
    <nav class="bottom-nav">
      <div class="nav-item">
        <img src="src/inicio.png" alt="Início">
      </div>
      <div class="nav-item">
        <img src="src/cardapio.png" alt="Cardápio">
      </div>
      <div class="nav-item active">
        <img src="src/pedidos.png" alt="Fidelidade">
        <span>Fidelidade</span>
      </div>
      <div class="nav-item">
        <img src="src/perfil.png" alt="Perfil">
      </div>
    </nav>

  </div>

</body>
</html>
